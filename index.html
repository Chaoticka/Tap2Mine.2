<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="TapMine Chain - Tap to mine crypto with physical screen taps. Blockchain PWA with Google Drive node hosting.">
  <title>TapMine Chain - Tap-to-Mine Blockchain PWA</title>
  <link rel="manifest" href="./assets/manifest-f_NeY-cT.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛓️</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #fff; overflow-x: hidden; }
    #app { min-height: 100vh; display: flex; flex-direction: column; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 24px; color: #00ff88; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(0,255,136,0.3); border-top-color: #00ff88; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link rel="stylesheet" href="./src/style.css">
  <script type="module" src="./src/main.js"></script>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      Loading TapMine Chain...
    </div>
  </div>
  <!-- Web3Modal + dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@2.0.0-alpha.1/dist/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/web3modal@1.9.12/dist/index.min.js"></script>
</body>
</html>
